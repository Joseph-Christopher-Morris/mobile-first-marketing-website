name: S3 CloudFront Deployment
on:
  workflow_dispatch:
    inputs:
      invalidate:
        type: choice
        options: ["true","false"]
        default: "true"
        required: true

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  S3_BUCKET: mobile-marketing-site-prod-1759705011281-tyzuo9
  CF_DISTRIBUTION_ID: E2IBMHQ3GCW6ZK
  NODE_VERSION: "22.19.0"
  HTML_CACHE: "public, max-age=600"
  ASSET_CACHE: "public, max-age=31536000, immutable"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm
      - name: Install
        run: npm ci
      - name: Brand / gradient guard
        run: |
          if grep -RInE "from-|via-|bg-gradient-|indigo-|purple-|yellow-" src apps; then
            echo "::error::Prohibited gradient/color classes found"; exit 1; fi
      - name: Build (Next export → /out)
        run: npm run build
      - name: Validate required assets in build output
        run: |
          node -e "
          const fs = require('fs');
          const manifest = JSON.parse(fs.readFileSync('config/required-assets.json','utf-8'));
          const assets = new Set();
          function walk(v) {
            if (typeof v === 'string') { assets.add(v); return; }
            if (Array.isArray(v)) { v.forEach(walk); return; }
            if (v && typeof v === 'object') {
              for (const [k,val] of Object.entries(v)) {
                if (k === '_comment' || k === 'protectedPrefixes') continue;
                walk(val);
              }
            }
          }
          walk(manifest);
          let missing = 0;
          for (const a of assets) {
            if (!fs.existsSync('out/' + a)) { console.error('MISSING: ' + a); missing++; }
          }
          if (missing > 0) { console.error(missing + ' required assets missing from out/'); process.exit(1); }
          console.log('✅ All ' + assets.size + ' required assets present in build output');
          "
      - name: Patch sitemap to include Privacy Policy if missing
        run: |
          PRIV="https://d15sc9fc739ev2.cloudfront.net/privacy-policy/"
          test -f out/sitemap.xml || exit 0
          grep -q "$PRIV" out/sitemap.xml || \
          awk -v u="$PRIV" '/<\/urlset>/{print "  <url><loc>"u"</loc></url>"}1' out/sitemap.xml > t && mv t out/sitemap.xml
      - uses: actions/upload-artifact@v4
        with:
          name: site-out
          path: out
          retention-days: 7

  deploy:
    if: ${{ github.ref == 'refs/heads/main' }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      # we need the repo to read the scripts/*
      - name: Checkout repo (for scripts)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/download-artifact@v4
        with:
          name: site-out
          path: out

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm


      - name: Init Audit Log
        run: node scripts/deployment-audit-logger.js init

      - name: Security Validation
        run: node scripts/validate-aws-security-configuration.js

      - name: Sync HTML (short TTL)
        run: |
          aws s3 sync out s3://$S3_BUCKET \
            --exclude "*" --include "*.html" --include "sitemap.xml" --include "robots.txt" \
            --cache-control "$HTML_CACHE" --delete

      - name: Sync assets (immutable)
        run: |
          aws s3 sync out s3://$S3_BUCKET \
            --exclude "*.html" --exclude "sitemap.xml" --exclude "robots.txt" \
            --cache-control "$ASSET_CACHE" --delete

      - name: MIME fixes
        run: |
          [ -f out/sitemap.xml ] && aws s3 cp out/sitemap.xml s3://$S3_BUCKET/sitemap.xml --cache-control "$HTML_CACHE" --content-type "application/xml"
          [ -f out/site.webmanifest ] && aws s3 cp out/site.webmanifest s3://$S3_BUCKET/site.webmanifest --cache-control "$ASSET_CACHE" --content-type "application/manifest+json"
          [ -f out/robots.txt ] && aws s3 cp out/robots.txt s3://$S3_BUCKET/robots.txt --cache-control "$HTML_CACHE" --content-type "text/plain"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation --distribution-id "$CF_DISTRIBUTION_ID" \
            --paths "/" "/index.html" "/services/*" "/blog*" "/images/*" "/_next/*" "/sitemap.xml"

      - name: Purge Cloudflare Cache
        run: |
          if [ -n "$CLOUDFLARE_ZONE_ID" ] && [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            curl -X POST "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE_ID/purge_cache" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              --data '{"files":["https://vividmediacheshire.com/sitemap.xml","https://vividmediacheshire.com/robots.txt","https://vividmediacheshire.com/"]}'
            echo "✅ Cloudflare cache purged"
          else
            echo "⚠️  Cloudflare credentials not set, skipping cache purge"
          fi
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        continue-on-error: true

      - name: Submit to IndexNow
        run: node scripts/submit-indexnow.js --all
        env:
          INDEXNOW_API_KEY: ${{ secrets.INDEXNOW_API_KEY }}
          SITE_DOMAIN: vividmediacheshire.com
          CLOUDFRONT_DOMAIN: d15sc9fc739ev2.cloudfront.net
        continue-on-error: true

      - name: Finalize Audit + Dashboard
        run: |
          node scripts/deployment-audit-logger.js complete
          node scripts/deployment-monitoring-integration.js

      - name: Verify production assets
        run: |
          echo "⏳ Waiting 30s for CloudFront propagation..."
          sleep 30
          node scripts/verify-production-assets.js
        env:
          SITE_ORIGIN: https://d15sc9fc739ev2.cloudfront.net
        continue-on-error: true
